<ws-season-picker
  [selectedYear]="selectedYear()"
  [availableYears]="availableYears"
  [scrapedAt]="scrapedAt()"
  [loading]="loading()"
  (yearSelected)="setYear($event)"
/>

@if (error()) {
  <ws-error-banner [message]="error()!" />
}

@if (loading()) {
  <ws-loading-state message="Loading scoring play data..." />
}

@if (seasonSummary() && !loading()) {
  <div class="stagger-children mt-6">
    <div class="tabs">
      <button
        class="tab"
        [class.active]="activeTab() === 'summary'"
        (click)="setTab('summary')"
      >
        Summary
      </button>
      <button
        class="tab"
        [class.active]="activeTab() === 'by-game'"
        (click)="setTab('by-game')"
      >
        By Game
      </button>
      <button
        class="tab"
        [class.active]="activeTab() === 'by-player'"
        (click)="setTab('by-player')"
      >
        By Player
      </button>
    </div>

    @if (activeTab() === 'summary') {
      <ws-summary-tab
        [selectedYear]="selectedYear()"
        [totalRuns]="totalRuns()"
        [gamesCount]="gamesCount()"
        [typesWithCounts]="typesWithCounts()"
        [byOuts]="byOuts()"
        [bySituation]="bySituation()"
        [byScenario]="byScenario()"
        [playerBreakdowns]="playerBreakdowns()"
        [sacBuntSummary]="sacBuntSummary()"
        [stolenBaseSummary]="stolenBaseSummary()"
        [runnerConversions]="runnerConversions()"
      />
    }

    @if (activeTab() === 'by-game') {
      <ws-by-game-tab
        [selectedYear]="selectedYear()"
        [games]="gameScoringPlays()"
        [expandedGame]="expandedGame()"
        (gameToggled)="toggleGame($event)"
      />
    }

    @if (activeTab() === 'by-player') {
      <ws-by-player-tab
        [selectedYear]="selectedYear()"
        [players]="playerBreakdowns()"
      />
    }
  </div>
}

@if (!seasonSummary() && !loading() && !error()) {
  <ws-empty-state />
}

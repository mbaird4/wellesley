<div class="flex flex-col gap-1">
  <span class="filter-label pl-0.5">Outs</span>
  <ws-button-toggle
    [options]="outsOptions"
    [value]="outsFilter()"
    (valueChange)="outsChanged.emit($any($event))"
  />
</div>

<div class="flex flex-col gap-1">
  <span class="filter-label pl-0.5">Innings</span>
  <ws-button-toggle
    [options]="inningOptions"
    [value]="inningFilter()"
    (valueChange)="inningChanged.emit($any($event))"
  />
</div>

<div class="flex flex-col gap-1">
  <span class="filter-label pl-0.5">Situation</span>
  <ws-button-toggle
    [options]="situationOptions"
    [value]="situationFilter()"
    mode="single"
    (valueChange)="situationChanged.emit($any($event))"
  />
</div>

<div class="flex flex-col gap-1">
  <span class="filter-label pl-0.5">Pinch Hit</span>
  <ws-slide-toggle
    [checked]="pinchHitOnly()"
    (checkedChange)="pinchHitToggled.emit($event)"
    class="p-1"
  />
</div>

<div class="flex flex-col gap-1">
  <span
    class="text-content-muted pl-0.5 text-sm font-semibold tracking-[0.05em] uppercase"
  >
    Outs
  </span>
  <ws-button-toggle
    [options]="outsOptions"
    [value]="outsFilter()"
    (valueChange)="outsChanged.emit($any($event))"
  />
</div>

<div class="flex flex-col gap-1">
  <span
    class="text-content-muted pl-0.5 text-sm font-semibold tracking-[0.05em] uppercase"
  >
    Innings
  </span>
  <ws-button-toggle
    [options]="inningOptions"
    [value]="inningFilter()"
    (valueChange)="inningChanged.emit($any($event))"
  />
</div>

<div class="flex flex-col gap-1">
  <span
    class="text-content-muted pl-0.5 text-sm font-semibold tracking-[0.05em] uppercase"
  >
    Situation
  </span>
  <ws-button-toggle
    [options]="situationOptions"
    [value]="situationFilter()"
    mode="single"
    (valueChange)="situationChanged.emit($any($event))"
  />
</div>

<div class="flex flex-col gap-1">
  <span
    class="text-content-muted pl-0.5 text-sm font-semibold tracking-[0.05em] uppercase"
  >
    Pinch Hit
  </span>
  <ws-slide-toggle
    [checked]="pinchHitOnly()"
    (checkedChange)="pinchHitToggled.emit($event)"
    class="p-1"
  />
</div>

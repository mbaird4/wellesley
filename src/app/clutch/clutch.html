<ws-season-picker
  [selectedYear]="selectedYear()"
  [availableYears]="availableYears"
  [scrapedAt]="scrapedAt()"
  [loading]="loading()"
  (yearSelected)="setYear($event)"
/>

@if (error()) {
  <ws-error-banner [message]="error()!" />
}

@if (loading()) {
  <ws-loading-state message="Loading clutch data..." />
}

@if (clutchData() && !loading()) {
  <div class="stagger-children mt-6 flex flex-col gap-6">
    <div class="tabs">
      <button
        class="tab"
        [class.active]="activeTab() === 'clutch'"
        (click)="activeTab.set('clutch')"
      >
        Clutch
      </button>
      <button
        class="tab"
        [class.active]="activeTab() === 'stranded'"
        (click)="activeTab.set('stranded')"
      >
        Runners Left On
      </button>
    </div>

    <ws-clutch-filters
      [outsFilter]="outsFilter()"
      [situationFilter]="situationFilter()"
      [inningFilter]="inningFilter()"
      [pinchHitOnly]="pinchHitOnly()"
      (outsChanged)="outsFilter.set($event)"
      (situationChanged)="situationFilter.set($event)"
      (inningChanged)="inningFilter.set($event)"
      (pinchHitToggled)="pinchHitOnly.set($event)"
    />

    @if (activeTab() === 'clutch') {
      <ws-clutch-player-table
        [players]="filteredPlayers()"
        [jerseyMap]="rosterService.wellesleyAbbrevJerseyMap()"
        [situationFilter]="situationFilter()"
        [selectedPlayer]="selectedPlayerName()"
        (playerSelected)="selectPlayer($event)"
      />

      @if (selectedPlayer()) {
        <ws-clutch-game-log [player]="selectedPlayer()!" />
      }
    }

    @if (activeTab() === 'stranded') {
      <ws-clutch-stranded
        [players]="filteredPlayers()"
        [filterContext]="filterContext()"
      />
    }
  </div>
}

@if (!clutchData() && !loading() && !error()) {
  <ws-empty-state />
}

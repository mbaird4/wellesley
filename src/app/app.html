@if (authenticated) {
<div class="max-w-[2400px] mx-auto px-8 py-6">

  <header class="flex items-center justify-between mb-6 pb-4 border-b border-line">
    <h1 class="m-0 text-[1.75rem] font-bold bg-linear-to-br from-brand-lighter to-brand bg-clip-text text-transparent tracking-tight">{{ title }}</h1>
    <nav class="flex gap-1 bg-surface-card rounded-[10px] p-[3px]">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Lineup Stats</a>
      <a routerLink="/woba" routerLinkActive="active" class="nav-link">wOBA</a>
      <a routerLink="/scoring" routerLinkActive="active" class="nav-link">Scoring Plays</a>
      <a routerLink="/opponents" routerLinkActive="active" class="nav-link">Opponents</a>
    </nav>
  </header>

  <router-outlet></router-outlet>
</div>
} @else {
<div class="min-h-screen flex items-center justify-center">
  <div class="bg-surface-card rounded-2xl p-8 shadow-lg w-full max-w-sm">
    <h1 class="text-xl font-bold text-center mb-6 bg-linear-to-br from-brand-lighter to-brand bg-clip-text text-transparent">{{ title }}</h1>
    <form (ngSubmit)="checkPassword()">
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Enter password"
        class="w-full px-4 py-2.5 rounded-lg bg-surface border border-line text-text-primary placeholder-text-secondary focus:outline-none focus:border-brand transition-colors"
        (input)="error = false"
      />
      @if (error) {
        <p class="text-red-400 text-sm mt-2">Incorrect password.</p>
      }
      <button
        type="submit"
        class="w-full mt-4 px-4 py-2.5 rounded-lg bg-brand text-white font-medium hover:bg-brand-lighter transition-colors cursor-pointer"
      >
        Enter
      </button>
    </form>
  </div>
</div>
}

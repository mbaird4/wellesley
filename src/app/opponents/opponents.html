@if (bp.gtSm()) {
  <!-- Desktop: sidebar + content -->
  <div class="flex gap-6 print:block">
    <ws-team-selector
      layout="vertical"
      [teams]="teams"
      [floridaTeams]="floridaTeams"
      [nextOpponent]="nextOpponentTeam()"
      [nextOpponentDate]="nextOpponentDate()"
      [activeTab]="activeTab()"
      class="print:hidden"
    />

    <router-outlet />
  </div>
} @else {
  <!-- Mobile: stacked layout -->
  <ws-team-selector
    layout="horizontal"
    [teams]="teams"
    [floridaTeams]="floridaTeams"
    [nextOpponent]="nextOpponentTeam()"
    [nextOpponentDate]="nextOpponentDate()"
    [activeTab]="activeTab()"
    class="print:hidden"
  />

  <router-outlet />
}

@if (bp.gtSm()) {
  <div class="mb-4 flex flex-col gap-3 print:hidden">
    <h2 class="mb-0">{{ data.selectedTeamName() }}</h2>

    <nav class="flex gap-1">
      @for (tab of tabs; track tab.path) {
        <a
          [routerLink]="tab.path"
          routerLinkActive
          #rla="routerLinkActive"
          class="cursor-pointer rounded-lg border-none px-4 py-2 text-sm font-medium no-underline transition-colors"
          [class]="
            rla.isActive
              ? 'bg-brand-bg text-brand-text'
              : 'bg-surface-elevated text-content-muted hover:text-content-bright'
          "
        >
          {{ tab.label }}
        </a>
      }
    </nav>
  </div>
} @else {
  <h2 class="mt-3 mb-2 text-lg print:hidden">{{ data.selectedTeamName() }}</h2>

  <nav class="mb-3 flex gap-1 print:hidden">
    @for (tab of tabs; track tab.path) {
      <a
        [routerLink]="tab.path"
        routerLinkActive
        #rla="routerLinkActive"
        class="cursor-pointer rounded-lg border-none px-4 py-2 text-sm font-medium no-underline transition-colors"
        [class]="
          rla.isActive
            ? 'bg-brand-bg text-brand-text'
            : 'bg-surface-elevated text-content-muted hover:text-content-bright'
        "
      >
        {{ tab.mobileLabel }}
      </a>
    }
  </nav>
}

<router-outlet />

<h3 class="text-content-bright mb-1 text-center text-sm font-semibold">
  {{ year() }}
</h3>

<ws-spray-field
  [zones]="zones()"
  [highlightZone]="highlightZone()"
  (zoneHover)="zoneHover.emit($event)"
  (zoneClick)="zoneClick.emit($event)"
/>

<div class="mt-1 flex items-center justify-center gap-3">
  <ws-spray-legend />
  <span class="text-content-muted text-xs">
    {{ totalContact() }} batted balls
  </span>
</div>

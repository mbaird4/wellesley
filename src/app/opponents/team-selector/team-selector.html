@if (layout() === 'vertical') {
  <nav class="flex w-40 shrink-0 flex-col gap-0.5">
    @for (team of teams(); track team.slug) {
      <a
        [routerLink]="[team.slug]"
        routerLinkActive
        #rla="routerLinkActive"
        class="rounded-lg px-3 py-2 text-left text-sm font-medium no-underline transition-colors"
        [class]="
          rla.isActive
            ? 'bg-brand-bg text-brand-text'
            : 'text-content-muted hover:text-content-bright hover:bg-surface-hover bg-transparent'
        "
      >
        {{ team.name }}
      </a>
    }
  </nav>
} @else {
  <nav class="scrollbar-none -mx-2 flex gap-1.5 overflow-x-auto px-2 pb-2">
    @for (team of teams(); track team.slug) {
      <a
        [routerLink]="[team.slug]"
        routerLinkActive
        #rla="routerLinkActive"
        class="shrink-0 rounded-full px-3 py-1.5 text-sm font-medium whitespace-nowrap no-underline transition-colors"
        [class]="
          rla.isActive
            ? 'bg-brand-bg text-brand-text'
            : 'bg-surface-elevated text-content-muted hover:text-content-bright'
        "
      >
        {{ team.name }}
      </a>
    }
  </nav>
}

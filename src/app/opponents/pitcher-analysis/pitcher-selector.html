@if (layout() === 'vertical') {
  <nav class="flex w-44 shrink-0 flex-col gap-0.5">
    @for (p of pitchers(); track p.name) {
      <button
        (click)="pitcherSelected.emit(p.name)"
        class="cursor-pointer rounded-lg border-none px-3 py-2 text-left text-sm font-medium transition-colors"
        [class]="
          p.name === selectedPitcher()
            ? 'bg-brand-bg text-brand-text'
            : 'text-content-muted hover:text-content-bright hover:bg-surface-hover bg-transparent'
        "
      >
        {{ p.label }}
      </button>
    }
  </nav>
} @else {
  <nav class="scrollbar-none -mx-2 flex gap-1.5 overflow-x-auto px-2 pb-2">
    @for (p of pitchers(); track p.name) {
      <button
        (click)="pitcherSelected.emit(p.name)"
        class="shrink-0 cursor-pointer rounded-full border-none px-3 py-1.5 text-sm font-medium whitespace-nowrap transition-colors"
        [class]="
          p.name === selectedPitcher()
            ? 'bg-brand-bg text-brand-text'
            : 'bg-surface-elevated text-content-muted hover:text-content-bright'
        "
      >
        {{ p.label }}
      </button>
    }
  </nav>
}

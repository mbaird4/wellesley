<span class="text-content-dim text-xs font-medium tracking-wider uppercase">
  Sort
</span>
@for (opt of options(); track opt.key) {
  <button
    class="cursor-pointer rounded-md border-none px-2.5 py-1 text-xs font-medium transition-[color,background]"
    [class]="
      value() === opt.key
        ? 'bg-brand-bg text-brand-text'
        : 'text-content-dim hover:text-content-secondary hover:bg-surface-card bg-transparent'
    "
    (click)="value.set(opt.key)"
  >
    {{ opt.label }}
  </button>
}

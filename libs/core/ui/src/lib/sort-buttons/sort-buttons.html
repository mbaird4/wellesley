<span class="control-label">Sort</span>
@for (opt of options(); track opt.key) {
  <button
    class="group relative flex cursor-pointer items-center gap-1 rounded-md border-none px-2.5 py-1 text-xs font-medium transition-[color,background]"
    [class]="
      value() === opt.key
        ? 'bg-brand-bg text-brand-text'
        : 'text-content-dim hover:text-content-secondary hover:bg-surface-card bg-transparent'
    "
    (click)="value.set(opt.key)"
  >
    {{ opt.label }}
    @if (opt.description) {
      <span class="relative inline-flex">
        <i class="fa-solid fa-circle-info text-[10px] opacity-70"></i>
        <span
          class="bg-surface-card text-content-secondary text-scale-[0.7] pointer-events-none absolute bottom-full left-1/2 z-50 mb-1.5 w-56 -translate-x-1/2 rounded-lg px-2.5 py-1.5 text-center leading-snug font-normal opacity-0 shadow-lg ring-1 ring-white/10 transition-opacity group-hover:opacity-100"
        >
          {{ opt.description }}
        </span>
      </span>
    }
  </button>
}

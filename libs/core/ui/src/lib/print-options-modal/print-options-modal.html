<!-- Backdrop -->
<button
  aria-label="Close modal"
  class="fixed inset-0 z-50 cursor-default border-none bg-black/70"
  (click)="dismissed.emit()"
></button>

<!-- Modal -->
<div
  class="bg-surface-card border-line-strong fixed inset-0 z-50 m-auto flex h-fit max-w-[800px] flex-col gap-5 rounded-2xl border p-6 shadow-2xl transition-all duration-200"
  style="
    animation: modal-enter 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.04),
      0 24px 48px rgba(0, 0, 0, 0.5),
      0 0 80px var(--color-brand-glow);
  "
>
  <!-- Header -->
  <div class="flex flex-col gap-1">
    <h3 class="text-content-heading m-0 text-lg font-semibold tracking-tight">
      Print Options
    </h3>
    <p class="text-content-dim m-0 text-sm">
      Choose which reports to generate
      <span class="text-brand-text font-semibold">
        · {{ years().join(', ') }}
      </span>
    </p>
  </div>

  <!-- Options -->
  <div class="flex flex-col gap-2">
    <button
      class="border-line flex cursor-pointer items-center gap-3 rounded-xl border px-4 py-3 transition-all duration-150"
      [class]="
        dugout()
          ? 'bg-brand-bg border-brand-lighter/30'
          : 'bg-surface-elevated hover:bg-surface-hover'
      "
      (click)="dugout.set(!dugout())"
    >
      <span
        class="flex h-5 w-5 shrink-0 items-center justify-center rounded-md border transition-all duration-150"
        [class]="
          dugout()
            ? 'bg-brand-light border-brand-lighter text-white'
            : 'border-line-strong bg-surface-elevated text-transparent'
        "
      >
        <i class="fa-solid fa-check text-[10px]"></i>
      </span>
      <div class="flex flex-col items-start gap-0.5">
        <span class="text-content-bright text-sm font-medium">
          Dugout Sheet
        </span>
        <span class="text-content-dim text-xs">
          Quick-reference card for the bench
        </span>
      </div>
    </button>

    <button
      class="border-line flex cursor-pointer items-center gap-3 rounded-xl border px-4 py-3 transition-all duration-150"
      [class]="
        coach()
          ? 'bg-brand-bg border-brand-lighter/30'
          : 'bg-surface-elevated hover:bg-surface-hover'
      "
      (click)="coach.set(!coach())"
    >
      <span
        class="flex h-5 w-5 shrink-0 items-center justify-center rounded-md border transition-all duration-150"
        [class]="
          coach()
            ? 'bg-brand-light border-brand-lighter text-white'
            : 'border-line-strong bg-surface-elevated text-transparent'
        "
      >
        <i class="fa-solid fa-check text-[10px]"></i>
      </span>
      <div class="flex flex-col items-start gap-0.5">
        <span class="text-content-bright text-sm font-medium">
          Coach Scouting Report
        </span>
        <span class="text-content-dim text-xs">
          Detailed breakdown with zone analysis
        </span>
      </div>
    </button>

    <button
      class="border-line flex cursor-pointer items-center gap-3 rounded-xl border px-4 py-3 transition-all duration-150"
      [class]="
        quickRef()
          ? 'bg-brand-bg border-brand-lighter/30'
          : 'bg-surface-elevated hover:bg-surface-hover'
      "
      (click)="quickRef.set(!quickRef())"
    >
      <span
        class="flex h-5 w-5 shrink-0 items-center justify-center rounded-md border transition-all duration-150"
        [class]="
          quickRef()
            ? 'bg-brand-light border-brand-lighter text-white'
            : 'border-line-strong bg-surface-elevated text-transparent'
        "
      >
        <i class="fa-solid fa-check text-[10px]"></i>
      </span>
      <div class="flex flex-col items-start gap-0.5">
        <span class="text-content-bright text-sm font-medium">
          Quick Reference
        </span>
        <span class="text-content-dim text-xs">
          Compact grid — 6 players per page for the dugout
        </span>
      </div>
    </button>
  </div>

  @if (players().length > 0) {
    <div class="flex flex-col gap-2">
      <div class="border-line-strong border-t pt-3">
        <span
          class="text-content-dim text-xs font-medium tracking-wide uppercase"
        >
          Player Order
        </span>
      </div>
      <ws-spray-coach-sort-panel
        [players]="players()"
        [lineupOrder]="lineupOrder()"
        [cacheKey]="cacheKey()"
        (orderChange)="onCoachSortChange($event)"
      />
    </div>
  }

  <!-- Actions -->
  <div class="flex justify-end gap-2">
    <button
      class="text-content-muted hover:text-content-bright hover:bg-surface-hover cursor-pointer rounded-lg border-none bg-transparent px-4 py-2 text-sm font-medium transition-colors duration-150"
      (click)="dismissed.emit()"
    >
      Cancel
    </button>
    <button
      class="cursor-pointer rounded-lg border-none px-5 py-2 text-sm font-semibold text-white transition-all duration-150 disabled:opacity-40 disabled:saturate-0"
      [class]="
        !dugout() && !coach() && !quickRef()
          ? 'bg-brand-light/50'
          : 'bg-brand-light hover:bg-brand-lighter shadow-[0_2px_12px_var(--color-brand-glow)]'
      "
      [disabled]="!dugout() && !coach() && !quickRef()"
      (click)="onPrint()"
    >
      <i class="fa-solid fa-print mr-1.5"></i>
      Print
    </button>
  </div>
</div>

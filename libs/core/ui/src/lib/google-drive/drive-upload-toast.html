<div
  class="bg-surface-card border-line-strong fixed right-6 bottom-6 z-[100] flex max-w-[420px] flex-col gap-3 rounded-xl border p-5 shadow-2xl"
  style="
    animation: modal-enter 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.04),
      0 12px 28px rgba(0, 0, 0, 0.5),
      0 0 40px var(--color-brand-glow);
  "
>
  <div class="flex items-start justify-between gap-3">
    <div class="flex items-center gap-2">
      <i class="fa-brands fa-google-drive text-brand-text text-lg"></i>
      <span class="text-content-bright text-sm font-semibold">
        Saved to Drive
      </span>
    </div>
    <button
      class="text-content-muted hover:text-content-bright cursor-pointer border-none bg-transparent text-base"
      aria-label="Dismiss"
      (click)="dismissed.emit()"
    >
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  @if (folderName()) {
    <p class="text-content-dim m-0 text-xs">
      Folder:
      <span class="text-content-bright font-medium">{{ folderName() }}</span>
    </p>
  }

  <ul class="m-0 flex list-none flex-col gap-1.5 p-0">
    @for (f of files(); track f.id) {
      <li class="flex items-center gap-2">
        <i class="fa-solid fa-file-pdf text-content-muted text-xs"></i>
        <a
          class="text-brand-text hover:text-brand-lighter truncate text-sm font-medium underline-offset-2 hover:underline"
          [href]="f.webViewLink"
          target="_blank"
          rel="noopener"
        >
          {{ f.name }}
        </a>
      </li>
    }
  </ul>
</div>

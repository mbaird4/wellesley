@if (layout() === 'vertical') {
  <nav
    class="bg-surface-card border-line flex w-44 shrink-0 flex-col gap-0.5 self-start overflow-y-auto rounded-xl border p-1.5"
  >
    @for (p of pitchers(); track p.name) {
      <button
        (click)="pitcherSelected.emit(p.name)"
        class="flex cursor-pointer items-baseline gap-1.5 rounded-lg border-l-2 border-transparent px-2.5 py-2 text-left text-sm font-medium transition-[color,background,border-color] duration-150"
        [class]="
          p.name === selectedPitcher()
            ? 'bg-brand-bg text-brand-text border-l-brand'
            : 'text-content-muted hover:text-content-bright hover:bg-surface-hover bg-transparent'
        "
      >
        @if (jerseyMap()?.[p.name.toLowerCase().replace('.', '')]; as jersey) {
          <span class="text-content-dim text-xs font-medium tabular-nums">
            {{ jersey }}
          </span>
        }
        <span>{{ p.label }}</span>
      </button>
    }
  </nav>
} @else {
  <nav class="scrollbar-none -mx-2 flex gap-1.5 overflow-x-auto px-2 pb-2">
    @for (p of pitchers(); track p.name) {
      <button
        (click)="pitcherSelected.emit(p.name)"
        class="shrink-0 cursor-pointer rounded-full border-none px-3 py-1.5 text-sm font-medium whitespace-nowrap transition-colors"
        [class]="
          p.name === selectedPitcher()
            ? 'bg-brand-bg text-brand-text'
            : 'bg-surface-elevated text-content-muted hover:text-content-bright'
        "
      >
        {{ p.label }}
      </button>
    }
  </nav>
}

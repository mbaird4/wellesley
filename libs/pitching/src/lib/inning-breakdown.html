<div class="flex items-center justify-between py-3">
  <h3 class="text-content-bright text-base font-semibold">By Inning</h3>

  @if (inningRows().length > 0) {
    <span class="text-content-dim flex items-center gap-1.5">
      <ws-slide-toggle
        [checked]="colorCoding()"
        (checkedChange)="colorCoding.set($event)"
      />
      Color coding
    </span>
  }
</div>

<div class="overflow-x-auto">
  <ws-pitcher-innings-table
    [rows]="inningRows()"
    [totals]="totalsRow()"
    [bordered]="true"
  />
</div>

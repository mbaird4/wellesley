@if (data(); as d) {
  <div class="bg-surface-card border-line overflow-hidden rounded-xl border">
    <div class="p-card flex flex-col gap-4">
      <div class="grid grid-cols-2 gap-4 sm:grid-cols-4">
        <div>
          <div
            class="text-content-dim text-xs font-medium tracking-wide uppercase"
          >
            ERA
          </div>
          <div
            class="text-content-bright mt-0.5 text-3xl font-bold tabular-nums"
          >
            {{ d.era.toFixed(2) }}
          </div>
        </div>
        <div>
          <div
            class="text-content-dim text-xs font-medium tracking-wide uppercase"
          >
            Record
          </div>
          <div
            class="text-content-bright mt-0.5 text-3xl font-bold tabular-nums"
          >
            {{ d.w }}-{{ d.l }}
          </div>
        </div>
        <div>
          <div
            class="text-content-dim text-xs font-medium tracking-wide uppercase"
          >
            IP
          </div>
          <div
            class="text-content-bright mt-0.5 text-3xl font-bold tabular-nums"
          >
            {{ d.ip }}
          </div>
        </div>
        <div>
          <div
            class="text-content-dim text-xs font-medium tracking-wide uppercase"
          >
            SO
          </div>
          <div
            class="text-content-bright mt-0.5 text-3xl font-bold tabular-nums"
          >
            {{ d.so }}
          </div>
        </div>
      </div>

      <div class="border-line flex flex-wrap gap-x-6 gap-y-2 border-t pt-4">
        <div class="flex items-baseline gap-1.5">
          <span
            class="text-content-dim text-xs font-medium tracking-wide uppercase"
          >
            BB
          </span>
          <span class="text-content-bright font-semibold">{{ d.bb }}</span>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span
            class="text-content-dim text-xs font-medium tracking-wide uppercase"
          >
            H
          </span>
          <span class="text-content-bright font-semibold">{{ d.h }}</span>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span
            class="text-content-dim text-xs font-medium tracking-wide uppercase"
          >
            HR
          </span>
          <span class="text-content-bright font-semibold">{{ d.hr }}</span>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span
            class="text-content-dim text-xs font-medium tracking-wide uppercase"
          >
            APP
          </span>
          <span class="text-content-bright font-semibold">{{ d.app }}</span>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span
            class="text-content-dim text-xs font-medium tracking-wide uppercase"
          >
            GS
          </span>
          <span class="text-content-bright font-semibold">{{ d.gs }}</span>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div class="bg-surface-card border-line overflow-hidden rounded-xl border">
    <div class="p-card text-content-dim text-center text-[0.95rem]">
      No pitching data available for this season yet.
    </div>
  </div>
}

name: Florida Trip Scrape

on:
  schedule:
    # 4x daily: midnight, 8am, 2pm ET (UTC-4 during DST)
    - cron: '0 4,12,18 10-21 3 *'
    # 8pm ET wraps to next UTC day
    - cron: '0 0 11-22 3 *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Scrape Florida Sidearm teams
        run: npm run scrape-opponents -- --florida --years 2026 --with-pitching --with-gamedata

      - name: Scrape Presto Sports teams
        run: npm run scrape-ext -- --site presto --years 2026 --with-pitching --with-gamedata

      - name: Scrape season stats for all teams
        run: npm run scrape-season-stats -- --year 2026

      - name: Commit updated data if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/opponents/
          if git diff --cached --quiet; then
            echo "No data changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh florida trip opponent data"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: scrape
    if: needs.scrape.outputs.has_changes == 'true'
    uses: ./.github/workflows/deploy.yml

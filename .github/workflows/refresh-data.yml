name: Refresh Current Season Data

on:
  schedule:
    # Daily at 6 AM ET (11 AM UTC) during softball season (Feb-May)
    - cron: '0 11 * 2-5 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch current season data
        run: npm run prefetch -- --years $(date +%Y)

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No data changes detected"
          else
            git commit -m "chore: refresh $(date +%Y) season data"
            git push
          fi

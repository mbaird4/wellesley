name: Refresh Next Non-Conference Opponent

on:
  schedule:
    # Daily at 8 PM ET (midnight UTC) during softball season (Mar-May)
    - cron: '0 0 * 3-6 *'
    # Extra runs on Tue/Wed/Thu at noon and 6 PM ET (game days + buffer)
    - cron: '0 17,23 * 3-5 2-4'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Scrape next non-conference opponent
        run: npm run scrape-next-opponent

      - name: Commit updated data if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/opponents/next-opponent/
          if git diff --cached --quiet; then
            echo "No data changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh next non-conference opponent data"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: refresh
    if: needs.refresh.outputs.has_changes == 'true'
    uses: ./.github/workflows/deploy.yml

name: Refresh Next Non-Conference Opponent

on:
  schedule:
    # Daily at 6 AM ET (11 AM UTC) during softball season (Mar-May)
    - cron: '0 11 * 3-5 *'
    # Extra runs on Tue/Wed/Thu at noon and 6 PM ET (game days + buffer)
    - cron: '0 17,23 * 3-5 2-4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Scrape next non-conference opponent
        run: npm run scrape-next-opponent

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/opponents/next-opponent/
          if git diff --cached --quiet; then
            echo "No data changes detected"
          else
            git commit -m "chore: refresh next non-conference opponent data"
            git push
          fi

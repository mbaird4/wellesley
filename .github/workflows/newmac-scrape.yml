name: Refresh NEWMAC Opponent Data

on:
  schedule:
    # Daily at 8 PM ET (midnight UTC) during softball season (Feb-May)
    - cron: '0 0 * 2-6 *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Scrape NEWMAC opponents (batting, pitching, gamedata)
        run: npm run scrape-opponents -- --years $(date +%Y) --with-pitching --with-gamedata

      - name: Scrape season stats for NEWMAC teams
        run: npm run scrape-season-stats -- --year $(date +%Y)

      - name: Commit updated data if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/opponents/
          if git diff --cached --quiet; then
            echo "No data changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh NEWMAC opponent data"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: scrape
    if: needs.scrape.outputs.has_changes == 'true'
    uses: ./.github/workflows/deploy.yml

name: Refresh Wellesley Data

on:
  schedule:
    # Daily at 8 PM ET (midnight UTC) during softball season (Feb-May)
    - cron: '0 0 * 2-6 *'
    # Extra 4 PM ET run (9 PM UTC) Mar 17-21 — coaches checking frequently
    - cron: '0 21 17-21 3 *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Scrape Wellesley season data
        run: npm run scrape-blue -- --years $(date +%Y)

      - name: Commit updated data if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No data changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh $(date +%Y) season data"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: refresh
    if: needs.refresh.outputs.has_changes == 'true'
    uses: ./.github/workflows/deploy.yml

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx nx run wellesley:tailwind:build
      - run: npx nx build wellesley --base-href /wellesley/
        env:
          NODE_ENV: production

      - run: echo "v1-auth" > dist/wellesley/browser/data/dcfg.txt

      # SPA routing: copy index.html to 404.html so GitHub Pages
      # serves the Angular app for all routes
      - run: cp dist/wellesley/browser/index.html dist/wellesley/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/wellesley/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

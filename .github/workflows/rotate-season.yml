name: Rotate Season Data

on:
  schedule:
    - cron: '0 15 10 2 *' # Feb 10 at 10 AM ET (3 PM UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Rotate season data
        run: npm run rotate-season

      - name: Commit rotated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: rotate season data for $(date +%Y)"
            git push
          fi
